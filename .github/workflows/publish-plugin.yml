name: Review & Publish Plugin

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by the skill-review composite action below: it
          # diffs against `github.event.before` to detect changed
          # skills, which needs full history reachable.
          fetch-depth: 0
      - name: Enforce tessl-version-floating carve-out
        # See rules/tessl-version-floating.md. The
        # `jbaruch/coding-policy: dependency-management`
        # runtime-managed-manifest carve-out preconditions a
        # deploy-time check that fails the deployment if any
        # specifier other than the permitted floating value
        # appears. Run before any publish step.
        run: ./scripts/check-tessl-pins.sh
      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      # Reviews only the skills whose files changed in this push, against the
      # latest published jbaruch/coding-policy. `credit-outage: skip` skips the
      # affected skill on a tessl out-of-credits (403) outage (flagged in the
      # run summary + the action's unreviewed-skills output); every other
      # review failure still hard-fails. De-vendored now that the native input
      # exists (jbaruch/coding-policy#188 / #190).
      - name: Skill review (changed only)
        uses: jbaruch/coding-policy/.github/actions/skill-review@3e3f74e90f1ff6ae283fedc51a7191d1b628b543
        with:
          threshold: '85'
          credit-outage: 'skip'
      - name: Stamp CHANGELOG with the published version
        uses: jbaruch/coding-policy/.github/actions/stamp-changelog@e75074c8105a25baf9fa0f42b9fc07ca1d313a3e # main @ 2026-06-29
      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
