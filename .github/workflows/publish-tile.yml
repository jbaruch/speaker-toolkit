name: Review & Publish Tile

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by the skill-review composite action below: it
          # diffs against `github.event.before` to detect changed
          # skills, which needs full history reachable.
          fetch-depth: 0
      - name: Enforce tessl-version-floating carve-out
        # See rules/tessl-version-floating.md. The
        # `jbaruch/coding-policy: dependency-management`
        # runtime-managed-manifest carve-out preconditions a
        # deploy-time check that fails the deployment if any
        # specifier other than the permitted floating value
        # appears. Run before any publish step.
        run: ./scripts/check-tessl-pins.sh
      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}
      - name: Review changed skills only
        # Per `jbaruch/coding-policy: context-artifacts` "Mandatory
        # Review" (changed-skills-loop clause): tessl skill review is
        # LLM-backed and credit-consuming; re-running against
        # unchanged content reproduces the prior rubric output. The
        # composite action iterates over skills whose files changed
        # since `github.event.before`. On workflow_dispatch or initial
        # push it falls back to reviewing every skill; on an
        # unreachable base it hard-fails (no silent skip).
        uses: jbaruch/coding-policy/.github/actions/skill-review@2a9df6575e153ce0d98900fdae26384c06df478f # main @ 2026-05-13
      - name: Stamp CHANGELOG with the version being published
        # Publish-on-merge has no "Unreleased" bucket: PR authors add un-headed
        # `### ` entries at the top of CHANGELOG.md. This stamps them with the
        # version patch-version-publish is about to assign (same registry-latest
        # +1 computation), so the published artifact and registry "what's new"
        # show them under their real version. Commit only, no push — the publish
        # step's own commit/push carries this commit along. [skip ci] guards the
        # bump commits from re-triggering this workflow.
        run: |
          python3 scripts/stamp-changelog.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "Stamp CHANGELOG for the published version [skip ci]"
      # No explicit `tessl eval run .` step here: per
      # `jbaruch/coding-policy: plugin-evals` (Persistence), the
      # Tessl-publish layer owns persistence execution — the eval
      # suite runs automatically inside `tesslio/patch-version-publish`
      # below. Adding a parallel `tessl eval run` step would be
      # duplicate cost producing the same numbers a maintainer would
      # already see at publish time, and could mask a publish-layer
      # eval failure with a parallel pass.
      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
